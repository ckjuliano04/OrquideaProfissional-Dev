services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: orquidea_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./static:/app/static
    networks:
      - orquidea_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: orquidea_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - orquidea_net

networks:
  orquidea_net:
    driver: bridge
